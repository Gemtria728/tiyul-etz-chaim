<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etz Chaim Journey</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<a class="back-btn" id="backBtn" href="#">← 여정으로</a>

<div id="gate">
  <div class="gate-bg"></div>
  <div class="gate-fog"></div>
  <div class="gate-content">
    <div class="gate-eyebrow">Etz Chaim · 에츠 하임 살아보기</div>
    <div class="gate-title">Etz Chaim Journey</div>
    <div class="gate-subtitle">생명나무를 걷는 여정</div>
    <div class="gate-tagline">
      "이제 조금 더 깊이 들어가 볼까요?"<br>
      당신이 끄덕이면, 두 번째 여행이 시작됩니다.
    </div>
    <div class="gate-grid">
      <div class="gate-card" onclick="location.href='mont.html'">
        <img src="mont.png" alt="몽생미셸">
        <div class="gate-card-overlay">
          <div class="card-num">01</div>
          <div class="card-path">Path מ · Mem</div>
          <div class="card-name">몽생미셸</div>
          <div class="card-tag">경계에서 시작되는 길</div>
          <div class="card-enter">Enter</div>
        </div>
      </div>
      <div class="gate-card" onclick="location.href='bethells.html'">
        <img src="bethells-piano.png" alt="베델스 비치">
        <div class="gate-card-overlay">
          <div class="card-num">02</div>
          <div class="card-path">Path ר · Resh</div>
          <div class="card-name">베델스 비치</div>
          <div class="card-tag">침묵이 가장 아름다운<br>풍경이 되는 곳</div>
          <div class="card-enter">Enter</div>
        </div>
      </div>
      <div class="gate-card" onclick="location.href='lofoten.html'">
        <img src="lofoten-reveal.jpg" alt="로포텐">
        <div class="gate-card-overlay">
          <div class="card-num">03</div>
          <div class="card-path">Path נ · Nun</div>
          <div class="card-name">로포텐</div>
          <div class="card-tag">침묵 속에서<br>길을 찾는 시간</div>
          <div class="card-enter">Enter</div>
        </div>
      </div>
    </div>
  </div>
  <div class="gate-footer">
    Dream <span>·</span> Travel <span>·</span> Remember <span>·</span> Transform
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
